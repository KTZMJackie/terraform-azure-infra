name: terraform

on:
  pull_request:
    paths:
      - "modules/**"
      - "environments/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "modules/**"
      - "environments/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.5"
  WORKING_DIR: environments/dev
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"

jobs:
  validate:
    name: fmt / validate / lint / security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform fmt
        run: terraform fmt -check -recursive
      - name: Terraform init (no backend)
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -backend=false
      - name: Terraform validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate
      - name: TFLint
        uses: terraform-linters/setup-tflint@v4
      - run: tflint --init && tflint --recursive
      - name: Checkov security scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false

  check-azure:
    name: check azure connection
    runs-on: ubuntu-latest
    outputs:
      connected: ${{ steps.check.outputs.connected }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ]; then
            echo "connected=true" >> "$GITHUB_OUTPUT"
          else
            echo "connected=false" >> "$GITHUB_OUTPUT"
            echo "Azure secrets not set — skipping plan/apply (validation still runs)."
          fi

  plan:
    name: plan (dev)
    needs: [validate, check-azure]
    if: needs.check-azure.outputs.connected == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -backend-config=backend.hcl
      - name: Terraform plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan -input=false -no-color

  apply:
    name: apply (dev)
    needs: [plan, check-azure]
    if: needs.check-azure.outputs.connected == 'true' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -backend-config=backend.hcl
      - name: Terraform apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -input=false -auto-approve
